name: ios-safari-diagnose

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to open in iOS Safari"
        required: true
        default: "https://togetherland.vercel.app"
      device:
        description: "Simulator device name"
        required: false
        default: "iPhone 17"
      swipes:
        description: "Number of scroll swipes"
        required: false
        default: "8"

jobs:
  diagnose:
    runs-on: macos-26
    timeout-minutes: 25
    env:
      TARGET_URL: ${{ github.event.inputs.url }}
      DEVICE_NAME: ${{ github.event.inputs.device }}
      SWIPES: ${{ github.event.inputs.swipes }}
    steps:
      - name: Boot simulator
        id: boot
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices available --json \
            | jq -r --arg NAME "$DEVICE_NAME" '
                .devices | to_entries | sort_by(.key) | reverse | .[]
                | select(.key | contains("SimRuntime.iOS")) | .value[]
                | select(.name == $NAME) | .udid' \
            | head -n1)
          if [ -z "$UDID" ]; then
            echo "Device '$DEVICE_NAME' not pre-created; creating it."
            DT=$(xcrun simctl list devicetypes --json \
              | jq -r --arg NAME "$DEVICE_NAME" '.devicetypes[] | select(.name==$NAME) | .identifier' | head -n1)
            RT=$(xcrun simctl list runtimes --json \
              | jq -r '.runtimes[] | select(.isAvailable) | select(.identifier|contains("iOS")) | .identifier' | sort -V | tail -n1)
            echo "devicetype=$DT runtime=$RT"
            [ -n "$DT" ] && [ -n "$RT" ] || { echo "No devicetype/runtime match"; xcrun simctl list devicetypes | grep -i "$DEVICE_NAME"; xcrun simctl list runtimes; exit 1; }
            UDID=$(xcrun simctl create "$DEVICE_NAME" "$DT" "$RT")
          fi
          [ -n "$UDID" ] || { echo "No device '$DEVICE_NAME'"; xcrun simctl list devices available; exit 1; }
          echo "Using $DEVICE_NAME → $UDID"
          BOOTED=0
          for a in 1 2 3; do
            if xcrun simctl bootstatus "$UDID" -b; then BOOTED=1; break; fi
            xcrun simctl shutdown "$UDID" >/dev/null 2>&1 || true; sleep 5
          done
          [ "$BOOTED" = "1" ] || { echo "boot failed"; exit 1; }
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          # Logical point size of the screen (for coordinate math).
          xcrun simctl io "$UDID" enumerate 2>/dev/null | grep -iE "point|pixel|Main" | head -8 || true

      - name: Install AXe and print command surface
        run: |
          set -euo pipefail
          export HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install cameroncooke/axe/axe
          echo "=== axe --help ==="; axe --help || true
          echo "=== axe swipe --help ==="; axe swipe --help || true
          echo "=== axe tap --help ==="; axe tap --help || true

      - name: Clean status bar
        continue-on-error: true
        run: |
          xcrun simctl status_bar "${{ steps.boot.outputs.udid }}" override \
            --time "9:41" --batteryLevel 100 --batteryState charged --cellularBars 4

      - name: Warm the URL from the runner
        run: |
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 40 "$TARGET_URL" || echo 000)
            echo "warm $i: $CODE"
            [ "$CODE" = "200" ] && break
            sleep 4
          done

      - name: Open URL and settle
        run: |
          UDID="${{ steps.boot.outputs.udid }}"
          for i in 1 2 3 4; do
            if xcrun simctl openurl "$UDID" "$TARGET_URL"; then echo "openurl ok (attempt $i)"; break; fi
            echo "openurl attempt $i failed; retrying"; sleep 5
          done
          sleep 22

      - name: Accessibility dump + coach-mark dismiss
        continue-on-error: true
        run: |
          UDID="${{ steps.boot.outputs.udid }}"
          mkdir -p shots
          xcrun simctl io "$UDID" screenshot shots/00-loaded.png
          echo "=== describe-ui (top of tree) ==="
          axe describe-ui --udid "$UDID" 2>&1 | head -120 || echo "describe-ui failed"
          # Try to dismiss Safari's first-run coach mark by tapping its X.
          # Screen is 402x874 pt on iPhone 17; the X sits near (363, 619).
          axe tap -x 363 -y 619 --udid "$UDID" 2>&1 || echo "X-tap failed"
          sleep 2
          xcrun simctl io "$UDID" screenshot shots/01-after-dismiss.png

      - name: Swipe to scroll, capture each step
        run: |
          set -u
          UDID="${{ steps.boot.outputs.udid }}"
          # Swipe in the clear upper band, above the toolbar/coach-mark zone
          # (~467-633 pt). Start 430 -> end 110, x=201. Repeat to advance.
          for i in $(seq 1 "$SWIPES"); do
            axe swipe --start-x 201 --start-y 430 --end-x 201 --end-y 110 --duration 0.25 --udid "$UDID" 2>&1 \
              || axe swipe --start-x 201 --start-y 430 --end-x 201 --end-y 110 --udid "$UDID" 2>&1 \
              || echo "swipe $i failed"
            sleep 2
            xcrun simctl io "$UDID" screenshot "shots/$(printf '%02d' $((i+1)))-swipe-$i.png"
          done
          sleep 3
          xcrun simctl io "$UDID" screenshot shots/98-settled.png
          # A native scroll sanity check: JS-free proof the page CAN scroll —
          # tap-and-hold drag via a long swipe from very top.
          axe swipe --start-x 201 --start-y 300 --end-x 201 --end-y 760 --duration 0.4 --udid "$UDID" 2>&1 || true
          sleep 2
          xcrun simctl io "$UDID" screenshot shots/99-scrolled-back.png
          ls -la shots/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: diagnose-shots
          path: shots/
          if-no-files-found: error
